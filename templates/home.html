{% extends 'base.html' %}


{% block content %}

    <div class="card">
        <h2>URL Shortener</h2>

        <form method="POST">
            {% csrf_token %}
            <input type="url" name="url" placeholder="Enter URL" required>
            <input type="text" name="custom_alias" placeholder="Custom alias (optional)">
            <button type="submit">Shorten</button>
        </form>


        {% if short_url %}
            <p>Short URL: <a href="{{ short_url }}">{{ short_url }}</a></p>
        {% endif %}
    </div>

{% endblock %}
