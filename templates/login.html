{% extends 'base.html' %}

{% block content %}

<div style="max-width: 400px; margin: 48px auto 0;">

    <div style="text-align:center; margin-bottom:32px;">
        <h2 style="font-size:28px; font-weight:800; margin-bottom:8px;">Welcome back</h2>
        <p style="font-size:14px; color:var(--text-muted);">Sign in to your dashboard</p>
    </div>

    <div class="card">
        <form method="POST" style="display:flex; flex-direction:column; gap:18px;">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" style="width:100%; justify-content:center; padding:13px; font-size:14px;">
                Sign In →
            </button>
        </form>
    </div>

</div>

{% endblock %}
