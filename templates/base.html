<!DOCTYPE html>
<html>
    <head>
        <title>URL Shortener</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">

        <style>
            
            :root {
                --bg:          #07161B;
                --bg-2:        #0C1F25;
                --surface:     #0F2A30;
                --surface-2:   #132f36;
                --border:      #1a3a42;
                --border-h:    #2a5a66;
                --accent:      #3D737F;
                --accent-h:    #4e8f9e;
                --accent-2:    #5AA9A6;
                --accent-glow: rgba(61,115,127,0.25);
                --text:        #D8EEF2;
                --text-muted:  #7AADB5;
                --text-dim:    #3a6470;
                --danger:      #c0444e;
                --success:     #3d9e72;
                --radius:      10px;
                --radius-lg:   16px;
                --transition:  0.22s cubic-bezier(0.4,0,0.2,1);
            }

            *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

            html { scroll-behavior: smooth; }

            body {
                font-family: 'DM Sans', sans-serif;
                font-size: 15px;
                background-color: var(--bg);
                color: var(--text);
                min-height: 100vh;
                background-image:
                    radial-gradient(ellipse 80% 50% at 50% -10%, rgba(61,115,127,0.12) 0%, transparent 70%);
                -webkit-font-smoothing: antialiased;
            }

            a {
                color: var(--accent-2);
                text-decoration: none;
                transition: color var(--transition);
            }
            a:hover { color: #fff; }

            nav {
                position: sticky;
                top: 0;
                z-index: 100;
                background: rgba(12, 31, 37, 0.82);
                backdrop-filter: blur(14px);
                -webkit-backdrop-filter: blur(14px);
                padding: 0 36px;
                height: 60px;
                display: flex;
                justify-content: space-between;
                align-items: center;
                border-bottom: 1px solid var(--border);
            }

            .nav-left::before {
                content: "⚡ snip";
                font-family: 'Syne', sans-serif;
                font-weight: 800;
                font-size: 18px;
                color: var(--accent-2);
                margin-right: 32px;
                letter-spacing: -0.5px;
            }

            .nav-left a,
            .nav-right a {
                font-family: 'DM Sans', sans-serif;
                font-size: 13.5px;
                font-weight: 500;
                color: var(--text-muted);
                padding: 6px 14px;
                border-radius: 6px;
                transition: background var(--transition), color var(--transition);
                letter-spacing: 0.01em;
            }

            .nav-left a { margin-right: 4px; }
            .nav-right a { margin-left: 4px; }

            .nav-left a:hover,
            .nav-right a:hover {
                color: var(--text);
                background: var(--surface-2);
            }

            .container {
                padding: 48px 36px;
                max-width: 1100px;
                margin: auto;
            }

            h1, h2, h3, h4 {
                font-family: 'Syne', sans-serif;
                letter-spacing: -0.03em;
            }

            h1 { font-size: 48px; font-weight: 800; color: var(--text); }
            h2 { font-size: 22px; font-weight: 700; color: var(--text); margin-bottom: 24px; }
            h3 { font-size: 13px; font-weight: 700; color: var(--text-muted); margin-bottom: 14px; text-transform: uppercase; letter-spacing: 0.1em; }

            p { line-height: 1.65; color: var(--text-muted); }

            .card {
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: var(--radius-lg);
                padding: 28px 32px;
                margin-bottom: 24px;
                transition: border-color var(--transition), box-shadow var(--transition);
            }

            .card:hover {
                border-color: var(--border-h);
                box-shadow: 0 0 0 1px var(--border-h), 0 8px 32px rgba(0,0,0,0.25);
            }

            .total-card {
                text-align: center;
                padding: 40px 32px;
                background: linear-gradient(135deg, var(--surface) 0%, #0d2d35 100%);
                position: relative;
                overflow: hidden;
            }

            .total-card::before {
                content: '';
                position: absolute;
                inset: 0;
                background: radial-gradient(ellipse 60% 60% at 50% 100%, var(--accent-glow), transparent);
                pointer-events: none;
            }

            .total-card h1 {
                font-size: 64px;
                font-weight: 800;
                background: linear-gradient(135deg, var(--accent-2), #A1E3D8);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
                margin: 8px 0 4px;
                line-height: 1;
            }

            .total-card p {
                font-size: 11px;
                text-transform: uppercase;
                letter-spacing: 0.14em;
                color: var(--text-dim);
                font-weight: 600;
                font-family: 'Syne', sans-serif;
            }

            .chart-grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 20px;
                margin-bottom: 24px;
            }

            .chart-container {
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: var(--radius-lg);
                padding: 24px 28px;
                transition: border-color var(--transition), box-shadow var(--transition);
            }

            .chart-container:hover {
                border-color: var(--border-h);
                box-shadow: 0 0 0 1px var(--border-h), 0 8px 32px rgba(0,0,0,0.2);
            }

            table {
                width: 100%;
                border-collapse: collapse;
                border-radius: var(--radius);
                overflow: hidden;
                font-size: 13.5px;
            }

            th {
                background: var(--accent);
                color: #07161B;
                padding: 13px 16px;
                text-align: left;
                font-family: 'Syne', sans-serif;
                font-size: 11px;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.09em;
                white-space: nowrap;
            }

            td {
                padding: 13px 16px;
                color: var(--text);
                border-bottom: 1px solid var(--border);
                vertical-align: middle;
                background: var(--surface);
            }

            tr:last-child td { border-bottom: none; }

            tbody tr { transition: background var(--transition); }
            tbody tr:hover td { background: var(--surface-2); }

            input[type="url"],
            input[type="text"],
            input[type="password"],
            input[type="email"] {
                background: var(--bg-2);
                border: 1px solid var(--border);
                border-radius: 8px;
                padding: 11px 16px;
                color: var(--text);
                font-family: 'DM Sans', sans-serif;
                font-size: 14px;
                width: 100%;
                transition: border-color var(--transition), box-shadow var(--transition), background var(--transition);
                outline: none;
            }

            input[type="url"]:hover,
            input[type="text"]:hover,
            input[type="password"]:hover,
            input[type="email"]:hover {
                border-color: var(--border-h);
            }

            input[type="url"]:focus,
            input[type="text"]:focus,
            input[type="password"]:focus,
            input[type="email"]:focus {
                border-color: var(--accent);
                box-shadow: 0 0 0 3px var(--accent-glow);
                background: var(--surface);
            }
<div class="card">
        <form method="POST">
            {% csrf_token %}

            <div class="form-row" style="flex-direction: column;">

                <div class="input-group">
                    <label>Long URL</label>
                    <input type="url" name="url" placeholder="https://example.com/very/long/url" required>
                </div>

                <div class="input-group">
                    <label>Custom Alias <span style="color:var(--text-dim); font-weight:400; text-transform:none; letter-spacing:0;">(optional, max 6 chars)</span></label>
                    <input type="text" name="custom_alias" placeholder="e.g. mylink" maxlength="6">
                </div>

                <div style="padding-top: 4px;">
                    <button type="submit">⚡ Shorten URL</button>
                </div>

            </div>
        </form>

        {% if short_url %}
            <div class="short-url-result">
                <span>Your link →</span>
                <a href="{{ short_url }}" target="_blank">{{ short_url }}</a>
            </div>
        {% endif %}

        {% if error %}
            <div class="error-msg">⚠ {{ error }}</div>
        {% endif %}
    </div>
            input::placeholder { color: var(--text-dim); }

            p > label {
                display: block;
                font-size: 11.5px;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.08em;
                color: var(--text-muted);
                font-family: 'Syne', sans-serif;
                margin-bottom: 6px;
            }

            input[type="checkbox"] {
                width: 16px;
                height: 16px;
                accent-color: var(--accent);
                cursor: pointer;
            }

            button {
                display: inline-flex;
                align-items: center;
                gap: 7px;
                background: var(--accent);
                border: none;
                padding: 11px 22px;
                color: #07161B;
                font-family: 'Syne', sans-serif;
                font-size: 13px;
                font-weight: 700;
                letter-spacing: 0.05em;
                border-radius: 8px;
                cursor: pointer;
                transition: background var(--transition), transform var(--transition), box-shadow var(--transition);
                position: relative;
                overflow: hidden;
            }

            button:hover {
                background: var(--accent-h);
                transform: translateY(-2px);
                box-shadow: 0 6px 24px var(--accent-glow);
            }

            button:active { transform: translateY(0); box-shadow: none; }

            button.btn-danger {
                background: rgba(192,68,78,0.12);
                color: #e07880;
                border: 1px solid rgba(192,68,78,0.25);
            }
            button.btn-danger:hover {
                background: var(--danger);
                color: #fff;
                box-shadow: 0 4px 20px rgba(192,68,78,0.3);
            }

            td a {
                font-size: 12.5px;
                font-weight: 500;
                padding: 5px 12px;
                border-radius: 6px;
                border: 1px solid var(--border);
                color: var(--text-muted);
                transition: background var(--transition), color var(--transition),
                            border-color var(--transition), transform var(--transition);
                display: inline-block;
                white-space: nowrap;
            }

            td a:hover {
                background: var(--surface-2);
                color: var(--text);
                border-color: var(--border-h);
                transform: translateY(-1px);
            }

            .badge {
                display: inline-block;
                padding: 3px 10px;
                border-radius: 20px;
                font-size: 11px;
                font-weight: 700;
                font-family: 'Syne', sans-serif;
                letter-spacing: 0.06em;
                text-transform: uppercase;
            }

            .badge-active {
                background: rgba(61,158,114,0.12);
                color: #4dbb88;
                border: 1px solid rgba(61,158,114,0.22);
            }

            .badge-inactive {
                background: rgba(192,68,78,0.1);
                color: #e07880;
                border: 1px solid rgba(192,68,78,0.18);
            }

            .short-url-result {
                display: flex;
                align-items: center;
                gap: 12px;
                margin-top: 20px;
                padding: 14px 18px;
                background: rgba(61,115,127,0.08);
                border: 1px solid rgba(61,115,127,0.28);
                border-radius: 10px;
                animation: fadeUp 0.3s ease;
            }

            .short-url-result span {
                font-size: 12px;
                font-family: 'Syne', sans-serif;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.1em;
                color: var(--text-dim);
            }

            .short-url-result a {
                font-family: 'Syne', sans-serif;
                font-weight: 600;
                font-size: 15px;
                color: var(--accent-2);
            }

            .short-url-result a:hover { color: #fff; }

            .error-msg {
                margin-top: 16px;
                padding: 12px 18px;
                background: rgba(192,68,78,0.08);
                border: 1px solid rgba(192,68,78,0.22);
                border-radius: 8px;
                color: #e07880;
                font-size: 13.5px;
                animation: fadeUp 0.25s ease;
            }

            .form-row {
                display: flex;
                gap: 12px;
                flex-wrap: wrap;
                align-items: flex-end;
            }

            .input-group {
                display: flex;
                flex-direction: column;
                gap: 7px;
                flex: 1;
                min-width: 180px;
            }

            .input-group label {
                font-size: 11px;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.1em;
                color: var(--text-dim);
                font-family: 'Syne', sans-serif;
            }

            @keyframes fadeUp {
                from { opacity: 0; transform: translateY(8px); }
                to   { opacity: 1; transform: translateY(0); }
            }

            ::-webkit-scrollbar { width: 5px; height: 5px; }
            ::-webkit-scrollbar-track { background: var(--bg); }
            ::-webkit-scrollbar-thumb { background: var(--border-h); border-radius: 99px; }
            ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

            @media (max-width: 768px) {
                nav { padding: 0 18px; }
                .container { padding: 28px 18px; }
                .chart-grid { grid-template-columns: 1fr; }
                .form-row { flex-direction: column; }
                .card { padding: 20px; }
            }
        </style>

    </head>

    <body>

        <nav>
            <div class="nav-left">
                <a href="/">Home</a>
                
                {% if user.is_authenticated %}
                    <a href="/dashboard/">Dashboard</a>
                {% endif %}
                    
            </div>

            <div class="nav-right">
                {% if user.is_authenticated %}
                    <form method="POST" action="/logout/" style="display:inline;">
                        {% csrf_token %}
                        <button type="submit" style="
                            background: none;
                            border: none;
                            padding: 6px 14px;
                            color: var(--text-muted);
                            font-family: 'DM Sans', sans-serif;
                            font-size: 13.5px;
                            font-weight: 500;
                            border-radius: 6px;
                            cursor: pointer;
                            transition: background var(--transition), color var(--transition);
                            letter-spacing: 0.01em;
                        "
                        onmouseover="this.style.background='var(--surface-2)'; this.style.color='var(--text)'"
                        onmouseout="this.style.background='none'; this.style.color='var(--text-muted)'">
                            Logout
                        </button>
                    </form>
                {% else %}
                    <a href="/login/">Login</a>
                {% endif %}
            </div>
        </nav>

        <div class="container">
            {% block content %}{% endblock %}
        </div>

    </body>
</html>
