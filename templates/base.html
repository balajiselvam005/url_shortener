<!DOCTYPE html>
<html>
    <head>
        <title>URL Shortener</title>
    </head>
    <body>
        <nav>
            <a href="/">Home</a>
            <a href="/dashboard/">Dashboard</a>

            
            {% if user.is_authenticated %}
                <a href="/logout/">Logout</a>
            {% else %}
                <a href="/login/">Login</a>
            {% endif %}
                
        </nav>

        <hr>

        {% block content %}  {% endblock %}
    </body>
</html>
